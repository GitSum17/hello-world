<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Site</title>
<style>
body {
font-family: Arial, sans-serif;
margin: 40px;
background: #f5f5f5;
}
.container {
background: white;
padding: 20px;
border-radius: 8px;
max-width: 600px;
box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
h1 {
margin-top: 0;
}
button {
padding: 10px 15px;
font-size: 16px;
cursor: pointer;
}
</style>
</head>
<body>
<div class="container">
<h1>My Test Website</h1>
<p>This is a simple HTML page pushed to GitHub.</p>
<p>If you see this online, deployment worked.</p>
<button onclick="sayHello()">Click test</button>
<p id="output"></p>
</div>

<script>
function sayHello() {
document.getElementById("output").textContent = "Button works. JavaScript running.";
}
</script>
</body>
</html>
